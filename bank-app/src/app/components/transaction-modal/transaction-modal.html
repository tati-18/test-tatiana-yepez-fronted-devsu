<div class="modal-backdrop" *ngIf="visible">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title">
        {{ transaction?.transactionId ? 'Editar Transacción' : 'Nueva Transacción' }}
      </h2>
      <button class="modal__close" (click)="onClose()">✕</button>
    </div>

    <div class="modal__body">
      <form [formGroup]="form" class="form-grid">
        <div class="form-group">
          <label>Cuenta</label>
          <select formControlName="accountId">
            <option [ngValue]="null" disabled>
              {{ loadingAccounts ? 'Cargando...' : 'Seleccione una cuenta' }}
            </option>
            <option *ngFor="let account of accounts" [ngValue]="account.id">
              {{ account.accountNumber }} — {{ account.accountType | titlecase }}
            </option>
          </select>
          <span class="form-error" *ngIf="isInvalid('accountId')">
            {{ getError(form.get('accountId')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Tipo de Transacción</label>
          <select formControlName="transactionType">
            <option value="CREDIT">Crédito</option>
            <option value="DEBIT">Débito</option>
          </select>
        </div>

        <div class="form-group">
          <label>Monto</label>
          <input type="number" formControlName="amount" />
          <span class="form-error" *ngIf="isInvalid('amount')">
            {{ getError(form.get('amount')) }}
          </span>
        </div>
      </form>
    </div>

    <div class="modal__footer">
      <button class="btn btn--sm btn--secondary" (click)="onClose()">Cancelar</button>
      <button class="btn btn--sm btn--primary" (click)="onSave()">Guardar</button>
    </div>
  </div>
</div>
