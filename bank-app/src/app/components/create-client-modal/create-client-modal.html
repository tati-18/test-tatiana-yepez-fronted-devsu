<div class="modal-backdrop" *ngIf="visible">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title">
        {{ client?.identification ? 'Editar Cliente' : 'Nuevo Cliente' }}
      </h2>
      <button class="modal__close" (click)="onClose()">✕</button>
    </div>

    <div class="modal__body">
      <form [formGroup]="form" class="form-grid">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="name" />
          <span class="form-error" *ngIf="isInvalid('name')">
            {{ getError(form.get('name')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Género</label>
          <select formControlName="gender">
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>

        <div class="form-group">
          <label>Edad</label>
          <input type="number" formControlName="age" />
          <span class="form-error" *ngIf="isInvalid('age')">
            {{ getError(form.get('age')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Identificación</label>
          <input type="text" formControlName="identification" />
          <span class="form-error" *ngIf="isInvalid('identification')">
            {{ getError(form.get('identification')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Dirección</label>
          <input type="text" formControlName="address" />
          <span class="form-error" *ngIf="isInvalid('address')">
            {{ getError(form.get('address')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" formControlName="phone" />
          <span class="form-error" *ngIf="isInvalid('phone')">
            {{ getError(form.get('phone')) }}
          </span>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" formControlName="password" />
          <span class="form-error" *ngIf="isInvalid('password')">
            {{ getError(form.get('password')) }}
          </span>
        </div>

        <div class="form-group form-group--checkbox">
          <label>
            <input type="checkbox" formControlName="status" />
            Activo
          </label>
        </div>
      </form>
    </div>

    <div class="modal__footer">
      <button class="btn btn--sm btn--secondary" (click)="onClose()">Cancelar</button>
      <button class="btn btn--sm btn--primary" (click)="onSave()">Guardar</button>
    </div>
  </div>
</div>
