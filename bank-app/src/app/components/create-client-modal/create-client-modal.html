<div class="modal-backdrop" *ngIf="visible">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title">
        {{ client.clientId ? 'Editar Cliente' : 'Nuevo Cliente' }}
      </h2>

      <button class="modal__close" (click)="onClose()">✕</button>
    </div>

    <div class="modal__body">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre</label>

          <input type="text" [(ngModel)]="client.name" />
        </div>

        <div class="form-group">
          <label>Género</label>

          <select [(ngModel)]="client.gender">
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>

        <div class="form-group">
          <label>Edad</label>

          <input type="number" [(ngModel)]="client.age" />
        </div>

        <div class="form-group">
          <label>Identificación</label>

          <input type="text" [(ngModel)]="client.identification" />
        </div>

        <div class="form-group">
          <label>Dirección</label>

          <input type="text" [(ngModel)]="client.address" />
        </div>

        <div class="form-group">
          <label>Teléfono</label>

          <input type="text" [(ngModel)]="client.phone" />
        </div>

        <div class="form-group">
          <label>Contraseña</label>

          <input type="password" [(ngModel)]="client.password" />
        </div>

        <div class="form-group form-group--checkbox">
          <label>
            <input type="checkbox" [(ngModel)]="client.status" />
            Activo
          </label>
        </div>
      </div>
    </div>

    <div class="modal__footer">
      <button class="btn btn--sm btn--cancel"  (click)="onClose()">Cancelar</button>

      <button class="btn btn--sm btn--edit"(click)="onSave()">Guardar</button>
    </div>
  </div>
</div>
